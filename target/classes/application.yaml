server:
  port: ${PORT:8082}

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:resqora}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:sanjeev}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyForLocalDevelopment123456789}
  expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG

twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID:test}
  auth:
    token: ${TWILIO_AUTH_TOKEN:test}
  phone:
    number: ${TWILIO_PHONE_NUMBER:test}

sendgrid:
  api-key: ${SENDGRID_API_KEY:test}
  from-email: sanjeevraj952545@gmail.com